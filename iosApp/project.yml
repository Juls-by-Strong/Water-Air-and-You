name: iosApp
options:
  bundleIdPrefix: com.julsbystrong
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

configFiles:
  Debug: Configuration/Config.xcconfig
  Release: Configuration/Config.xcconfig

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID)
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        INFOPLIST_FILE: iosApp/Info.plist
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LINKER_FLAGS:
          - "$(inherited)"
          - "-framework"
          - "ComposeApp"
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          export JAVA_HOME=/Applications/Android\ Studio.app/Contents/jbr/Contents/Home
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles:
          - "$(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/ComposeApp.framework"
